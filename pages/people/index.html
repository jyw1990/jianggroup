<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People · Jiang Group · Penn Engineering</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-logo" href="../../index.html">
        <img src="../../assets/images/logo.png" alt="Jiang Group · Penn Engineering">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li class="nav-item"><a href="../../index.html">Home</a></li>
        <li class="nav-item">
          <a href="index.html" class="active">People</a>
          <ul class="nav-dropdown">
            <li><a href="../alumni/index.html">Alumni</a></li>
          </ul>
        </li>
        <li class="nav-item"><a href="../research/index.html">Research</a></li>
        <li class="nav-item"><a href="../publications/index.html">Publications</a></li>
        <li class="nav-item"><a href="../photos/index.html">Photos</a></li>
        <li class="nav-item"><a href="../contact/index.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="page-content">
    <div id="peopleContent">
      <p style="color:var(--muted)">Loading…</p>
    </div>
  </main>

  <footer class="site-footer"></footer>

  <script src="../../assets/js/main.js"></script>
  <script>
  (async () => {
    const data = await fetchData('people.json');
    const pi = data.pi;
    const root = rootPath('');

    function photoOrPlaceholder(src, alt, wrapClass) {
      const imgTag = src
        ? `<img src="${root}${src}" alt="${alt}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'placeholder-person\\'>👤</div>'">`
        : `<div class="placeholder-person">👤</div>`;
      return `<div class="${wrapClass}">${imgTag}</div>`;
    }

    let html = '';

    // ── PI ──
    html += `
      <div class="pi-section">
        ${photoOrPlaceholder(pi.photo, pi.name, 'pi-photo')}
        <div class="pi-info">
          <h2>${pi.name}</h2>
          <div class="pi-title">${pi.title}</div>
          <div class="pi-email">Email: <a href="mailto:${pi.email}">${pi.email}</a></div>
          <p>${pi.bio}</p>
        </div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin-bottom:2rem;">
    `;

    // ── Postdocs ──
    if (data.postdocs?.length) {
      html += `<h2 class="section-title">POSTDOCTORAL SCHOLARS</h2><div class="phd-grid">`;
      data.postdocs.forEach(p => {
        html += `
          <div class="phd-card">
            ${photoOrPlaceholder(p.photo, p.name, 'person-photo')}
            <div class="phd-info">
              <h3>${p.name}</h3>
              <div class="person-email">Email: <a href="mailto:${p.email}">${p.email}</a></div>
              <p>${p.bio}</p>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // ── PhD Students ──
    if (data.phd_students?.length) {
      html += `<h2 class="section-title">Ph.D. STUDENTS</h2><div class="phd-grid">`;
      data.phd_students.forEach(p => {
        html += `
          <div class="phd-card">
            ${photoOrPlaceholder(p.photo, p.name, 'person-photo')}
            <div class="phd-info">
              <h3>${p.name}</h3>
              <div class="person-email">Email: <a href="mailto:${p.email}">${p.email}</a></div>
              <p>${p.bio}</p>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // ── Master's Students ──
    if (data.masters_students?.length) {
      html += `<h2 class="section-title">MASTER'S STUDENTS</h2><div class="people-grid">`;
      data.masters_students.forEach(p => {
        html += `
          <div class="person-card">
            ${photoOrPlaceholder(p.photo, p.name, '')}
            <h3>${p.name}</h3>
            <div class="person-dept">${p.department}</div>
            <div class="person-email"><a href="mailto:${p.email}">${p.email}</a></div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // ── Undergrad Students ──
    if (data.undergrad_students?.length) {
      html += `<h2 class="section-title">UNDERGRADUATE STUDENTS</h2><div class="people-grid">`;
      data.undergrad_students.forEach(p => {
        html += `
          <div class="person-card">
            ${photoOrPlaceholder(p.photo, p.name, '')}
            <h3>${p.name}</h3>
            <div class="person-dept">${p.department}</div>
            <div class="person-email"><a href="mailto:${p.email}">${p.email}</a></div>
          </div>
        `;
      });
      html += `</div>`;
    }

    // ── High School Students ──
    if (data.highschool_students?.length) {
      html += `<h2 class="section-title">HIGH SCHOOL STUDENTS</h2><div class="people-grid">`;
      data.highschool_students.forEach(p => {
        html += `
          <div class="person-card">
            ${photoOrPlaceholder(p.photo, p.name, '')}
            <h3>${p.name}</h3>
            <div class="person-dept">${p.school}</div>
          </div>
        `;
      });
      html += `</div>`;
    }

    document.getElementById('peopleContent').innerHTML = html;
  })();
  </script>
</body>
</html>
